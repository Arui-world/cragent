spring:
  application:
    name: cragent-main
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    dashscope:
      agent:
        enabled: false
      image:
        enabled: false
    model:
      audio:
        speech: none
        transcription: none
      image: none
      rerank: none
      video: none
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${AI_DASHSCOPE_EMBEDDING_DIMENSIONS:1024}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
